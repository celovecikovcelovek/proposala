<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>У меня есть вопрос...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fff0f5;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }
        h1 { color: #d63384; text-align: center; }
        .buttons { margin-top: 20px; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            margin: 10px;
            transition: 0.3s;
        }
        #yesBtn { background-color: #ff69b4; color: white; }
        #noBtn { background-color: #ccc; color: #333; position: relative; }
    </style>
</head>
<body>

    <h1 id="question">Влада, ты выйдешь за меня? 💍</h1>
    
    <div class="buttons">
        <button id="yesBtn">ДА!</button>
        <button id="noBtn">Нет</button>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');

        // Когда нажимают "Да"
        yesBtn.addEventListener('click', () => {
            question.innerText = "Ура! Я самый счастливый! ❤️";
            document.body.style.background = "#ffb6c1";
            yesBtn.style.display = "none";
            noBtn.style.display = "none";
        });

        // Когда наводят на "Нет" (кнопка убегает)
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });
    </script>
</body>
</html>
